        <div class="subhero_heading">
            <div class="subhero_heading-underline-wrapper"><span class="display-3xl">Regional Moments</span>
                <div class="subhero_heading-underline"></div>
            </div><span class="display-3xl">&nbsp;</span><span class="display-3xl">&</span><span class="display-3xl">&nbsp;</span><span class="display-3xl">Must-Knows</span>
        </div>
        <div class="subhero-sub-text-wrapper">
            <p>Stay ahead of the game with global and regional moments and must-knows.</p>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const underline = document.querySelector(".subhero_heading-underline");

        if (!underline) return;

        // Set the starting state
        underline.style.width = "0%";
        underline.style.transition = "none";
        underline.style.overflow = "hidden";

        // Force browser to register the 0% width before animating
        underline.offsetWidth;

        // Animate to 100% after 0.2s delay
        requestAnimationFrame(() => {
            underline.style.transition = "width 600ms ease 200ms";
            underline.style.width = "100%";
        });
    });
</script>
